<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#e5e7eb; }
.dark { background:black; color:white; }
.dark .bg-white { background:#1f2937 !important; }
.page { display:none; }
.active { display:block; }
</style>
</head>

<body id="body">

<!-- HEADER -->
<div class="flex justify-between p-3 bg-blue-600 text-white">
<button onclick="location.reload()">🔄</button>
<h1 class="font-bold">Money Manager</h1>
<button onclick="toggleDark()">🌙</button>
</div>

<!-- NAV -->
<div class="flex justify-around bg-gray-300 p-2">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('log')">Log</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('calendar')">Calendar</button>
<button onclick="showPage('summary')">Summary</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active p-3">

<div class="grid grid-cols-2 gap-2 mb-3">
<div class="bg-white p-2 rounded">Weekly Services: <span id="weekCount">0</span></div>
<div class="bg-white p-2 rounded">Received: $<span id="received">0</span></div>
<div class="bg-white p-2 rounded">Pending: $<span id="pending">0</span></div>
<div class="bg-white p-2 rounded">Total Services: <span id="total">0</span></div>
</div>

<div class="grid grid-cols-2 gap-2">
<div class="bg-white p-2 rounded">Week 1<br>R:$<span id="w1r">0</span> P:$<span id="w1p">0</span><br>S:<span id="w1s">0</span></div>
<div class="bg-white p-2 rounded">Week 2<br>R:$<span id="w2r">0</span> P:$<span id="w2p">0</span><br>S:<span id="w2s">0</span></div>
<div class="bg-white p-2 rounded">Week 3<br>R:$<span id="w3r">0</span> P:$<span id="w3p">0</span><br>S:<span id="w3s">0</span></div>
<div class="bg-white p-2 rounded">Week 4<br>R:$<span id="w4r">0</span> P:$<span id="w4p">0</span><br>S:<span id="w4s">0</span></div>
</div>

<div class="bg-white p-3 mt-3 rounded">
<input id="name" placeholder="Customer Name" class="border p-1 w-full mb-2">
<input type="date" id="date" class="border p-1 w-full mb-2">
<input type="time" id="time" class="border p-1 w-full mb-2">
<button onclick="addService()" class="bg-blue-500 text-white px-3 py-1">Add</button>
</div>

</div>

<!-- SUMMARY PAGE -->
<div id="summary" class="page p-3">

<h2 class="font-bold mb-2">Summary</h2>

<div class="flex gap-2 mb-2">
<input type="date" id="fromDate" class="border p-1 w-full">
<input type="date" id="toDate" class="border p-1 w-full">
<button onclick="applyFilter()" class="bg-blue-500 text-white px-2">Filter</button>
</div>

<canvas id="moneyChart" class="bg-white p-2 rounded mb-3"></canvas>
<canvas id="serviceChart" class="bg-white p-2 rounded"></canvas>

</div>

<!-- LOG -->
<div id="log" class="page p-3">
<h2 class="font-bold mb-2">Log</h2>
<div id="logList"></div>
</div>

<!-- CLIENTS -->
<div id="clients" class="page p-3">
<h2 class="font-bold mb-2">Clients</h2>
<div id="clientList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="page p-3">
<input type="date" id="calDate" onchange="showCalendar()">
<div id="calList"></div>
</div>

<script>

let logs = JSON.parse(localStorage.getItem("logs")) || [];
let moneyChart, serviceChart;

/* SAVE */
function save(){
localStorage.setItem("logs", JSON.stringify(logs));
update();
renderLogs();
renderClients();
drawCharts();
}

/* NAV */
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* FORMAT */
function formatTime(t){
let [h,m]=t.split(":");
h=+h;
let ampm=h>=12?"PM":"AM";
h=h%12||12;
return h+":"+m+" "+ampm;
}
function formatDate(d){
let p=d.split("-");
return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

/* ADD */
function addService(){
let name=nameInput.value.trim();
let date=dateInput.value;
let time=timeInput.value;
if(!name||!date||!time) return;

logs.push({name,date,time,paid:false});
save();
}

/* DASHBOARD */
function update(){
let received=0,pending=0;
let w=[{r:0,p:0,s:0},{r:0,p:0,s:0},{r:0,p:0,s:0},{r:0,p:0,s:0}];

logs.forEach(l=>{
let d=new Date(l.date);
let i=Math.floor((d.getDate()-1)/7);

if(i<4){
w[i].s++;
if(l.paid) w[i].r+=15;
else w[i].p+=15;
}

if(l.paid) received+=15;
else pending+=15;
});

document.getElementById("received").innerText=received;
document.getElementById("pending").innerText=pending;
document.getElementById("total").innerText=logs.length;

["1","2","3","4"].forEach((n,i)=>{
document.getElementById("w"+n+"r").innerText=w[i].r;
document.getElementById("w"+n+"p").innerText=w[i].p;
document.getElementById("w"+n+"s").innerText=w[i].s;
});
}

/* LOG */
function renderLogs(){
logList.innerHTML="";
logs.forEach((l,i)=>{
logList.innerHTML+=`
<div class="bg-white p-2 mt-2 rounded">
${l.name} - ${formatDate(l.date)} ${formatTime(l.time)}
<div class="flex gap-2 mt-1">
<button onclick="editLog(${i})" class="bg-blue-500 text-white px-2">Edit</button>
<button onclick="deleteLog(${i})" class="bg-red-500 text-white px-2">Delete</button>
</div></div>`;
});
}
function deleteLog(i){ logs.splice(i,1); save(); }
function editLog(i){ let n=prompt("Edit",logs[i].name); if(n) logs[i].name=n; save(); }

/* CLIENTS */
function renderClients(){
let map={};
logs.forEach(l=>{
if(!map[l.name]) map[l.name]={pending:0};
if(!l.paid) map[l.name].pending+=15;
});

let arr=Object.keys(map).map(n=>({name:n,pending:map[n].pending}));
arr.sort((a,b)=>b.pending-a.pending);

clientList.innerHTML="";
arr.forEach(c=>{
clientList.innerHTML+=`
<div onclick="openClient('${c.name}')" class="bg-white p-2 mt-2 rounded flex justify-between">
<span>${c.name}</span>
<span class="text-red-500">$${c.pending}</span>
</div>`;
});
}

function openClient(name){
let list=logs.map((l,i)=>({...l,i})).filter(l=>l.name===name);

let html=`<button onclick="renderClients()" class="bg-gray-500 text-white px-2 mb-2">⬅ Back</button><h3>${name}</h3>`;

list.forEach(l=>{
html+=`
<div class="bg-gray-200 p-2 mt-2">
${formatDate(l.date)} ${formatTime(l.time)}
<div class="flex gap-2 mt-1">
<button onclick="editLog(${l.i})" class="bg-blue-500 text-white px-2">Edit</button>
${l.paid
? `<button onclick="togglePaid(${l.i})" class="bg-pink-500 text-white px-2">Paid Already</button>`
: `<button onclick="togglePaid(${l.i})" class="bg-green-500 text-white px-2">Paid</button>`}
<button onclick="deleteLog(${l.i})" class="bg-red-500 text-white px-2">Delete</button>
</div></div>`;
});

clientList.innerHTML=html;
}

function togglePaid(i){ logs[i].paid=!logs[i].paid; save(); }

/* CALENDAR */
function showCalendar(){
let d=calDate.value;
calList.innerHTML="";
logs.filter(l=>l.date===d).forEach(l=>{
calList.innerHTML+=`<div>${l.name} - ${formatTime(l.time)}</div>`;
});
}

/* SUMMARY GRAPH */
function applyFilter(){
drawCharts(fromDate.value,toDate.value);
}

function drawCharts(start,end){

let filtered=logs.filter(l=>(!start||l.date>=start)&&(!end||l.date<=end));

/* MONEY GRAPH */
let r=[0,0,0,0],p=[0,0,0,0];

filtered.forEach(l=>{
let w=Math.floor((new Date(l.date).getDate()-1)/7);
if(w<4){
if(l.paid) r[w]+=15;
else p[w]+=15;
}
});

/* SERVICE GRAPH (Mon-Sun) */
let days=[0,0,0,0,0,0,0];

filtered.forEach(l=>{
let d=new Date(l.date).getDay();
d=d===0?6:d-1;
days[d]++;
});

if(moneyChart) moneyChart.destroy();
if(serviceChart) serviceChart.destroy();

moneyChart=new Chart(moneyChartCanvas,{
type:'bar',
data:{labels:["W1","W2","W3","W4"],
datasets:[{label:"Received",data:r},{label:"Pending",data:p}]}
});

serviceChart=new Chart(serviceChartCanvas,{
type:'bar',
data:{labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{label:"Services",data:days}]}
});
}

/* INIT */
update();
renderLogs();
renderClients();
drawCharts();

</script>

</body>
</html>
